version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: securedrop_db
    restart: always
    environment:
      POSTGRES_USER: secure_admin
      POSTGRES_PASSWORD: SuperSecretPassword123!
      POSTGRES_DB: securedrop
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
